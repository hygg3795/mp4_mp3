<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes"><title>MP4转MP3</title><script src="https://cdnjs.cloudflare.com/ajax/libs/lamejs/1.2.1/lame.min.js"></script><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#f5f7fa;min-height:100vh;display:flex;justify-content:center;align-items:center;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',sans-serif;padding:1.5rem}.card{max-width:780px;width:100%;background:#ffffff;border-radius:32px;padding:2.4rem 2.4rem 2.8rem;box-shadow:0 8px 40px rgba(0,0,0,0.06),0 2px 8px rgba(0,0,0,0.02)}.header{display:flex;align-items:center;margin-bottom:1.8rem}.header h1{font-size:1.7rem;font-weight:600;color:#1a2e3f;letter-spacing:-0.3px}.upload-zone{background:#f8fafc;border:2px dashed #dde5ed;border-radius:24px;padding:2.6rem 1.5rem;text-align:center;cursor:pointer;transition:0.15s;margin-bottom:1.2rem}.upload-zone:hover{border-color:#9bb8d1;background:#f4f8fc}.upload-zone:active{transform:scale(0.98)}.upload-zone .icon{font-size:2.4rem;margin-bottom:0.4rem}.upload-zone p{color:#1e3b4f;font-weight:500;font-size:1rem}#fileInput{display:none}.video-preview{margin:0.8rem 0 1.4rem 0;border-radius:16px;overflow:hidden;background:#000;position:relative}.video-preview video{width:100%;display:block;max-height:320px;background:#000}.video-preview.hidden{display:none}.file-bar{display:flex;align-items:center;gap:0.8rem;margin:-0.2rem 0 1.2rem 0;padding:0.5rem 1rem;background:#f0f5fa;border-radius:60px;border:1px solid #e5ecf3}.file-bar .name{flex:1;font-size:0.9rem;font-weight:450;color:#1a3b4f;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.file-bar .clear-btn{background:none;border:none;font-size:1.2rem;color:#8aaec4;cursor:pointer;padding:0 0.2rem;transition:0.1s;line-height:1}.file-bar .clear-btn:hover{color:#b34a4a}.file-bar.hidden{display:none}.settings{background:#f8fafc;border-radius:20px;padding:1.4rem 1.6rem 1.6rem;margin-bottom:1.6rem;border:1px solid #eef3f8}.setting-row{margin-bottom:1.2rem}.setting-row:last-child{margin-bottom:0}.setting-row .label-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:0.4rem}.setting-row .label-row label{font-size:0.9rem;font-weight:500;color:#2a4a5e}.setting-row .label-row .value-display{font-size:0.9rem;font-weight:500;color:#1a3b4f;background:white;padding:0.1rem 0.8rem;border-radius:30px;border:1px solid #dde5ed;min-width:60px;text-align:center}.setting-row input[type="range"]{width:100%;height:5px;background:#dde5ed;border-radius:10px;accent-color:#2d6b8a;outline:none;border:none;padding:0;cursor:pointer}.setting-row input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:18px;height:18px;border-radius:50%;background:#2d6b8a;cursor:pointer;transition:0.1s}.setting-row input[type="range"]::-webkit-slider-thumb:hover{transform:scale(1.1)}.setting-row input[type="range"]::-moz-range-thumb{width:18px;height:18px;border-radius:50%;background:#2d6b8a;cursor:pointer;border:none}.time-range-wrapper{display:flex;gap:1.2rem;align-items:stretch}.time-range-item{flex:1}.time-range-item .label-row{margin-bottom:0.3rem}.time-range-item .label-row label{font-size:0.8rem;color:#6b8a9e;font-weight:400}.time-range-item .label-row .value-display{font-size:0.8rem;min-width:50px;padding:0.05rem 0.6rem}.actions{display:flex;gap:0.8rem;flex-wrap:wrap}.btn{flex:1;min-width:120px;padding:0.75rem 1.2rem;border:none;border-radius:60px;font-size:0.95rem;font-weight:600;cursor:pointer;transition:0.15s;display:flex;align-items:center;justify-content:center;gap:0.5rem;letter-spacing:0.2px}.btn:active{transform:scale(0.96)}.btn-primary{background:#1c6180;color:white;box-shadow:0 4px 12px rgba(28,97,128,0.2)}.btn-primary:hover{background:#16526d}.btn-primary:disabled{opacity:0.4;pointer-events:none}.btn-secondary{background:#eef3f8;color:#2a4a5e}.btn-secondary:hover{background:#e2eaf2}.status-area{margin-top:1.6rem;display:flex;align-items:center;justify-content:flex-end;padding-top:1.2rem;border-top:1px solid #eef3f8}.download-link{background:#e5f0f8;padding:0.3rem 1.6rem;border-radius:30px;border:1px solid #c7dcec;color:#1a4a62;text-decoration:none;font-weight:500;font-size:0.9rem;transition:0.15s;display:inline-flex;align-items:center;gap:0.4rem}.download-link:hover{background:#d4e5f2;border-color:#9bb8d1}.download-link.hidden{display:none}.footnote{margin-top:1.2rem;font-size:0.75rem;color:#8aaec4;text-align:center;border-top:1px solid #eef3f8;padding-top:1rem;letter-spacing:0.2px}@media (max-width:550px){.card{padding:1.5rem 1.2rem 1.8rem}.header h1{font-size:1.4rem}.settings{padding:1rem 1rem 1.2rem}.time-range-wrapper{flex-direction:column;gap:0.6rem}.btn{min-width:100px;font-size:0.85rem;padding:0.6rem 0.8rem}}</style></head><body><div class="card"><div class="header"><h1>MP4 → MP3</h1></div><div class="upload-zone" id="uploadZone"><div class="icon">📤</div><p>点击或拖拽上传视频</p><input type="file" id="fileInput" accept="video/*,.mp4,.mov,.avi,.mkv,.webm,.m4v"></div><div class="file-bar hidden" id="fileBar"><span>📁</span><span class="name" id="fileName">video.mp4</span><button class="clear-btn" id="clearFileBtn">✕</button></div><div class="video-preview hidden" id="videoPreview"><video id="videoPlayer" controls></video></div><div class="settings"><div class="setting-row"><div class="label-row"><label>比特率</label><span class="value-display" id="bitrateDisplay">192 kbps</span></div><input type="range" id="bitrateRange" min="64" max="320" value="192" step="8"></div><div class="setting-row"><div class="label-row"><label>截取片段</label><span style="font-size:0.8rem;color:#8aaec4;" id="timeRangeDisplay">0s → 0s</span></div><div class="time-range-wrapper"><div class="time-range-item"><div class="label-row"><label>开始</label><span class="value-display" id="startDisplay">0s</span></div><input type="range" id="startTimeRange" min="0" max="100" value="0" step="0.5"></div><div class="time-range-item"><div class="label-row"><label>结束</label><span class="value-display" id="endDisplay">30s</span></div><input type="range" id="endTimeRange" min="0" max="100" value="30" step="0.5"></div></div></div></div><div class="actions"><button class="btn btn-primary" id="extractBtn">提取</button><button class="btn btn-secondary" id="resetBtn">重置</button></div><div class="status-area"><a href="#" id="downloadLink" class="download-link hidden">下载</a></div><div class="footnote">孤光</div></div><script>(function(){const uploadZone=document.getElementById('uploadZone');const fileInput=document.getElementById('fileInput');const fileBar=document.getElementById('fileBar');const fileName=document.getElementById('fileName');const clearFileBtn=document.getElementById('clearFileBtn');const videoPreview=document.getElementById('videoPreview');const videoPlayer=document.getElementById('videoPlayer');const bitrateRange=document.getElementById('bitrateRange');const bitrateDisplay=document.getElementById('bitrateDisplay');const startTimeRange=document.getElementById('startTimeRange');const endTimeRange=document.getElementById('endTimeRange');const startDisplay=document.getElementById('startDisplay');const endDisplay=document.getElementById('endDisplay');const timeRangeDisplay=document.getElementById('timeRangeDisplay');const extractBtn=document.getElementById('extractBtn');const resetBtn=document.getElementById('resetBtn');const downloadLink=document.getElementById('downloadLink');let currentFile=null;let audioBlobURL=null;let videoDuration=0;let videoURL=null;function formatTime(seconds){if(!seconds||seconds<0)return '0s';if(seconds<60)return Math.round(seconds)+'s';const mins=Math.floor(seconds/60);const secs=Math.round(seconds%60);return mins+'m'+secs+'s'}function updateBitrateDisplay(){bitrateDisplay.textContent=bitrateRange.value+' kbps'}bitrateRange.addEventListener('input',updateBitrateDisplay);function updateTimeDisplays(){const start=parseFloat(startTimeRange.value);const end=parseFloat(endTimeRange.value);startDisplay.textContent=formatTime(start);endDisplay.textContent=formatTime(end);timeRangeDisplay.textContent=formatTime(start)+' → '+formatTime(end)}startTimeRange.addEventListener('input',function(){let start=parseFloat(this.value);let end=parseFloat(endTimeRange.value);if(start>end){endTimeRange.value=start;endDisplay.textContent=formatTime(start)}updateTimeDisplays();if(videoPlayer&&videoDuration>0){videoPlayer.currentTime=Math.min(start,videoDuration-0.5)}});endTimeRange.addEventListener('input',function(){let end=parseFloat(this.value);let start=parseFloat(startTimeRange.value);if(end<start){startTimeRange.value=end;startDisplay.textContent=formatTime(end)}updateTimeDisplays()});function resetFileUI(){currentFile=null;videoDuration=0;fileBar.classList.add('hidden');fileName.textContent='';videoPreview.classList.add('hidden');if(videoURL){URL.revokeObjectURL(videoURL);videoURL=null}videoPlayer.src='';if(audioBlobURL){URL.revokeObjectURL(audioBlobURL);audioBlobURL=null}downloadLink.classList.add('hidden');downloadLink.href='#';extractBtn.disabled=false;extractBtn.textContent='提取';fileInput.value='';startTimeRange.value='0';endTimeRange.value='30';updateTimeDisplays()}function setFileInfo(file){currentFile=file;fileName.textContent=file.name;fileBar.classList.remove('hidden');if(audioBlobURL){URL.revokeObjectURL(audioBlobURL);audioBlobURL=null}downloadLink.classList.add('hidden');downloadLink.href='#';extractBtn.disabled=false;extractBtn.textContent='提取';if(videoURL)URL.revokeObjectURL(videoURL);videoURL=URL.createObjectURL(file);videoPlayer.src=videoURL;videoPreview.classList.remove('hidden');videoPlayer.onloadedmetadata=function(){videoDuration=videoPlayer.duration;startTimeRange.max=videoDuration;endTimeRange.max=videoDuration;endTimeRange.value=Math.min(videoDuration,30);if(videoDuration<30){endTimeRange.value=videoDuration}updateTimeDisplays()};videoPlayer.onerror=function(){videoDuration=60;startTimeRange.max=60;endTimeRange.max=60;updateTimeDisplays()}}function encodeMP3(audioBuffer,bitrate){const numChannels=audioBuffer.numberOfChannels;const sampleRate=audioBuffer.sampleRate;const samples=audioBuffer.length;const channelData=[];for(let ch=0;ch<numChannels;ch++){channelData.push(audioBuffer.getChannelData(ch))}const pcmData=new Int16Array(samples*numChannels);for(let i=0;i<samples;i++){for(let ch=0;ch<numChannels;ch++){const sample=Math.max(-1,Math.min(1,channelData[ch][i]));const intSample=sample<0?sample*0x8000:sample*0x7FFF;pcmData[i*numChannels+ch]=Math.round(intSample)}}const encoder=new lamejs.Mp3Encoder(numChannels,sampleRate,bitrate);const mp3Data=[];const blockSize=1152;for(let i=0;i<pcmData.length;i+=blockSize*numChannels){const chunk=pcmData.subarray(i,i+blockSize*numChannels);const mp3buf=encoder.encodeBuffer(chunk);if(mp3buf.length>0){mp3Data.push(new Uint8Array(mp3buf))}}const mp3buf=encoder.flush();if(mp3buf.length>0){mp3Data.push(new Uint8Array(mp3buf))}let totalLen=0;for(let i=0;i<mp3Data.length;i++){totalLen+=mp3Data[i].length}const result=new Uint8Array(totalLen);let offset=0;for(let i=0;i<mp3Data.length;i++){result.set(mp3Data[i],offset);offset+=mp3Data[i].length}return result}extractBtn.addEventListener('click',async function(){if(!currentFile){alert('请先上传视频文件');return}if(typeof lamejs==='undefined'||typeof lamejs.Mp3Encoder==='undefined'){alert('MP3 编码库加载失败，请刷新页面重试');return}extractBtn.disabled=true;extractBtn.textContent='编码中...';const bitrate=parseInt(bitrateRange.value,10);let start=parseFloat(startTimeRange.value)||0;let end=parseFloat(endTimeRange.value)||videoDuration||60;if(start>=end){extractBtn.disabled=false;extractBtn.textContent='提取';return}if(videoDuration>0){start=Math.min(start,videoDuration-0.1);end=Math.min(end,videoDuration);if(start>=end){extractBtn.disabled=false;extractBtn.textContent='提取';return}}try{const audioCtx=new(window.AudioContext||window.webkitAudioContext)();const arrayBuffer=await currentFile.arrayBuffer();let audioBuffer=await audioCtx.decodeAudioData(arrayBuffer);const sampleRate=audioBuffer.sampleRate;const startSample=Math.floor(start*sampleRate);const endSample=Math.floor(end*sampleRate);const frameCount=endSample-startSample;if(frameCount<=0){extractBtn.disabled=false;extractBtn.textContent='提取';audioCtx.close();return}const numChannels=audioBuffer.numberOfChannels;const newBuffer=new AudioBuffer({numberOfChannels:numChannels,length:frameCount,sampleRate:sampleRate});for(let ch=0;ch<numChannels;ch++){const channelData=audioBuffer.getChannelData(ch);const newData=newBuffer.getChannelData(ch);for(let i=0;i<frameCount;i++){newData[i]=channelData[startSample+i]}}const mp3Data=encodeMP3(newBuffer,bitrate);if(mp3Data.length===0){alert('编码失败，请重试');extractBtn.disabled=false;extractBtn.textContent='提取';audioCtx.close();return}const blob=new Blob([mp3Data],{type:'audio/mpeg'});const downloadFileName=`audio_${Math.round(start)}s-${Math.round(end)}s.mp3`;if(audioBlobURL)URL.revokeObjectURL(audioBlobURL);audioBlobURL=URL.createObjectURL(blob);downloadLink.href=audioBlobURL;downloadLink.download=downloadFileName;downloadLink.classList.remove('hidden');extractBtn.disabled=false;extractBtn.textContent='完成';setTimeout(()=>{extractBtn.textContent='提取'},2000);audioCtx.close()}catch(err){console.error('提取失败:',err);alert('提取失败: '+err.message);extractBtn.disabled=false;extractBtn.textContent='提取'}});uploadZone.addEventListener('click',(e)=>{if(e.target.closest('.clear-btn'))return;fileInput.click()});uploadZone.addEventListener('dragover',(e)=>{e.preventDefault();uploadZone.style.borderColor='#2d6b8a'});uploadZone.addEventListener('dragleave',(e)=>{e.preventDefault();uploadZone.style.borderColor='#dde5ed'});uploadZone.addEventListener('drop',(e)=>{e.preventDefault();uploadZone.style.borderColor='#dde5ed';const file=e.dataTransfer.files[0];if(file){if(!file.type.startsWith('video/')&&!file.name.match(/\.(mp4|mov|avi|mkv|webm|m4v|flv|wmv)$/i)){return}setFileInfo(file)}});fileInput.addEventListener('change',(e)=>{const file=e.target.files[0];if(!file)return;if(!file.type.startsWith('video/')&&!file.name.match(/\.(mp4|mov|avi|mkv|webm|m4v|flv|wmv)$/i)){resetFileUI();return}setFileInfo(file)});clearFileBtn.addEventListener('click',(e)=>{e.stopPropagation();resetFileUI()});resetBtn.addEventListener('click',function(){resetFileUI();if(audioBlobURL){URL.revokeObjectURL(audioBlobURL);audioBlobURL=null}downloadLink.classList.add('hidden');extractBtn.disabled=false;extractBtn.textContent='提取';fileInput.value='';startTimeRange.value='0';endTimeRange.value='30';updateTimeDisplays()});updateBitrateDisplay();updateTimeDisplays()})();</script></body></html>
